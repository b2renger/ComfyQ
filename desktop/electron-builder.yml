appId: com.comfyq.discovery
productName: ComfyQ Discovery
# `npm run dist` builds an unsigned installer for the host OS. Releases (all
# platforms) are published to GitHub Releases by CI on a version tag; installed
# apps auto-update from there via electron-updater (see main.js).
files:
  - main.js
  - preload.js
  - renderer/**
  - assets/**
directories:
  output: dist
afterPack: scripts/afterPack.cjs   # ad-hoc code-signs the macOS .app (no Apple cert) so arm64 isn't "damaged"
# Where electron-updater looks for new versions (public repo → no token needed).
publish:
  provider: github
  owner: b2renger
  repo: ComfyQ
  releaseType: release          # full release, not draft/prerelease (drafts are ignored by the updater)
win:
  target: nsis
  icon: assets/icon.png
mac:
  target:                       # build Apple Silicon (arm64) AND Intel (x64); zip is REQUIRED for latest-mac.yml
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.utilities
  icon: assets/icon.png
  identity: null                # electron-builder skips its own signing; afterPack.cjs does the ad-hoc sign (one controlled step)
  hardenedRuntime: false        # ad-hoc + hardened runtime fails to launch (library validation / no Team ID); safe to disable since we don't notarize
linux:
  target: AppImage
  icon: assets/icon.png
nsis:
  oneClick: true
  perMachine: false             # per-user install → silent updates need no UAC prompt
  deleteAppDataOnUninstall: false
